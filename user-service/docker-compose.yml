name: user-service

services:
  db_user:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-user_db}
    ports:
      - "${DB_PORT:-5437}:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3005}:3005"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db_user:5432/user_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-internal-service-token-change-in-production}
    networks:
      default:
      micro-net:
        aliases:
          - user-service
    depends_on:
      db_user:
        condition: service_healthy

volumes:
  user_data:

networks:
  micro-net:
    external: true
    name: micro-net

